<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>CarSales</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:Segoe UI,sans-serif;
        }

        .navbar{
            background:#111827 !important;
        }

        .navbar-brand{
            font-size:24px;
            font-weight:700;
        }

        .hero{
            background:white;
            padding:40px;
            border-radius:20px;
            margin-bottom:30px;
            box-shadow:0 5px 20px rgba(0,0,0,0.05);
        }

        .hero h1{
            font-weight:700;
        }

        .car-card{
            border:none;
            border-radius:18px;
            overflow:hidden;
            transition:0.3s;
            background:white;
        }

        .car-card:hover{
            transform:translateY(-8px);
            box-shadow:0 15px 35px rgba(0,0,0,0.15);
        }

        .car-image{
            height:240px;
            object-fit:cover;
        }

        .price{
            color:#198754;
            font-size:28px;
            font-weight:700;
        }

        .car-title{
            font-size:24px;
            font-weight:700;
            margin-bottom:15px;
        }

        .info-row{
            display:flex;
            justify-content:space-between;
            margin-bottom:8px;
        }

        .badge-custom{
            background:#e9f7ef;
            color:#198754;
            padding:6px 12px;
            border-radius:20px;
            font-size:13px;
        }

        footer{
            margin-top:60px;
            padding:30px;
            text-align:center;
            color:#777;
        }

    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            🚗 CarSales
        </a>

        <div class="ms-auto">

            {% if user.is_authenticated %}

                <a href="/create/" class="btn btn-success me-2">
                    Добавить авто
                </a>

                <a href="/users/profile/" class="btn btn-outline-light me-2">
                    Профиль
                </a>

                <a href="/users/logout/" class="btn btn-danger">
                    Выход
                </a>

            {% else %}

                <a href="/users/login/" class="btn btn-outline-light me-2">
                    Вход
                </a>

                <a href="/users/register/" class="btn btn-success">
                    Регистрация
                </a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<footer>
    © 2026 CarSales. Учебный сервис продажи автомобилей.
</footer>

</body>
</html>
