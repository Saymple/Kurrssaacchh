{% extends 'base.html' %}

{% block content %}

<h2>
    Добавить автомобиль
</h2>

<form
    method="post"
    enctype="multipart/form-data"
    class="card p-4 shadow"
>

    {% csrf_token %}

    {{ form.as_p }}

    <button
        class="btn btn-success"
    >
        Опубликовать
    </button>

</form>

{% endblock %}
