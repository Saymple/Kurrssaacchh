{% extends 'base.html' %}

{% block content %}

<h1>Вход</h1>

<form method="post">

    {% csrf_token %}

    <p>
        <input
            type="text"
            name="username"
            placeholder="Логин"
        >
    </p>

    <p>
        <input
            type="password"
            name="password"
            placeholder="Пароль"
        >
    </p>

    <button type="submit">
        Войти
    </button>

</form>

{% endblock %}
