{% extends 'base.html' %}

{% block content %}

<h2>
    Личный кабинет
</h2>

<div class="card p-4 shadow">

    {% if user.avatar %}
        <img
            src="{{ user.avatar.url }}"
            width="200"
            class="mb-3"
        >
    {% endif %}

    <h4>
        {{ user.username }}
    </h4>

    <p>
        Email: {{ user.email }}
    </p>

    <p>
        Телефон: {{ user.phone }}
    </p>

    <p>
        Город: {{ user.city }}
    </p>

</div>

{% endblock %}
